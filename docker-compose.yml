version: '3.8'

services:
  web:
    build:
      context: .
      args:
        - NODE_ENV=development
    image: jsa-landing-page:dev
    container_name: jsa-landing-page-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    command: npm run dev
